# collects telemetry data from one or more sources
receivers:
  otlp:
    protocols:
      http:
        endpoint: 0.0.0.0:4318

service:
  telemetry:
    logs:
      level: debug
  pipelines:
    metrics:
      receivers: [otlp]
      exporters: [otlphttp/victoriametrics]
    logs:
      receivers: [otlp]
      exporters: [otlphttp/victorialogs, awss3]
    traces:
      receivers: [otlp]
      exporters: [otlphttp/victoriatraces]

exporters:
  otlphttp/victoriametrics:
    compression: gzip
    encoding: proto
    metrics_endpoint: "http://victoriametrics:8428/opentelemetry/v1/metrics"

  otlphttp/victoriatraces:
    traces_endpoint: "http://victoriatraces:10428/insert/opentelemetry/v1/traces"

  otlphttp/victorialogs:
    logs_endpoint: "http://victorialogs:9428/insert/opentelemetry/v1/logs"

  awss3:
    s3uploader:
      region: 'us-east-1'
      s3_bucket: 'tharshen-terraform-primary-bucket'
      s3_prefix: 'logs'
      s3_partition_format: '%Y/%m/%d/%H/%M'